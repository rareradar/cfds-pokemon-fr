name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Rebuild quotidien 07:00 UTC (09:00 Paris été) : publie automatiquement
  # les articles à date de publication future une fois leur date atteinte
  # (ex. diffusion échelonnée). Retirable une fois le backlog daté écoulé.
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        env:
          JEKYLL_ENV: production
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bundle exec jekyll build --baseurl "$PAGES_BASE_PATH"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve IndexNow key
        id: indexnow
        run: |
          KEY_FILE=$(find . -maxdepth 1 -regextype posix-extended -regex './[0-9a-f]{32}\.txt' | head -n1)
          if [ -z "$KEY_FILE" ]; then
            echo "No IndexNow key file found at repo root, skipping ping." >&2
            echo "key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "key=$(basename "$KEY_FILE" .txt)" >> "$GITHUB_OUTPUT"

      - name: Ping IndexNow (home + sitemap)
        if: steps.indexnow.outputs.key != ''
        env:
          INDEXNOW_KEY: ${{ steps.indexnow.outputs.key }}
        run: |
          for URL in "https://rareradar.fr/" "https://rareradar.fr/sitemap.xml"; do
            curl -s -o /dev/null -w "IndexNow %{http_code} - $URL\n" \
              --get "https://api.indexnow.org/indexnow" \
              --data-urlencode "url=$URL" \
              --data-urlencode "key=$INDEXNOW_KEY"
          done
