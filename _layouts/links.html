<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e5e5e0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  <!-- OpenGraph pour partage sur réseaux -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ '/assets/marie/avatar.webp' | absolute_url }}">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <style>
    :root {
      --bg-page: #e5e5e0;
      --bg-paper: #ffffff;
      --text-main: #111111;
      --text-muted: #444444;
      --line: #999999;
      --accent-red: #b91c1c;
      --highlight-yellow: #ffeb3b;
      --font-mono: 'Courier New', Courier, monospace;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1.5rem 1rem;
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.45;
      font-size: 16px;
    }

    .memo-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-paper);
      border: 2px solid var(--text-main);
      padding: 1.5rem;
      position: relative;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
    }

    /* Filigrane CONFIDENTIEL */
    .memo-wrapper::before {
      content: 'CONFIDENTIEL';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-35deg);
      font-family: var(--font-mono);
      font-size: 4.5rem;
      font-weight: 900;
      color: rgba(185, 28, 28, 0.07);
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
      user-select: none;
    }

    /* Fusion header compact Marie (Léa v4) */
    .memo-combined {
      max-width: 720px;
      margin: 0 auto 1.5rem;
      padding: 0.75rem 1rem;
      position: relative;
      z-index: 2;
    }

    .memo-ref-line {
      font-family: 'Courier New', Courier, monospace;
      color: #b91c1c;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      margin: 0 0 0.4rem;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .memo-meta-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0 0 0.6rem;
      flex-wrap: wrap;
    }

    .memo-meta-row img.avatar-stamp-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.2);
      border: 2px double #b91c1c;
      flex-shrink: 0;
    }

    .meta-label {
      font-family: 'Courier New', Courier, monospace;
      color: #b91c1c;
      font-size: 0.75rem;
      margin-right: 0.25rem;
    }

    .meta-value {
      font-family: system-ui, -apple-system, sans-serif;
      color: #111827;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .memo-sep {
      border: none;
      border-top: 1px dashed #d1d5db;
      margin: 0.5rem 0;
    }

    .memo-section-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      color: #374151;
      margin: 0 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .memo-slogan-block {
      font-style: italic;
      padding-left: 0.75rem;
      border-left: 3px solid #b91c1c;
      margin: 0 0 0.4rem;
      color: #1f2937;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .memo-handle {
      font-family: 'Courier New', Courier, monospace;
      color: #6b7280;
      font-size: 0.75rem;
      margin: 0;
    }

    @media (max-width: 480px) {
      .memo-combined { padding: 0.5rem; }
      .memo-ref-line, .meta-label, .memo-section-title, .memo-handle { font-size: 0.7rem; }
      .memo-meta-row img.avatar-stamp-img { width: 40px; height: 40px; }
      .memo-slogan-block { font-size: 0.9rem; padding-left: 0.5rem; }
    }

    /* Liste / Grille */
    .memo-list {
      position: relative;
      z-index: 1;
    }

    dl {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0;
    }

    article.item {
      border-bottom: 1px solid var(--line);
      padding: 1rem 0;
      display: contents;
    }

    article.item:last-child {
      border-bottom: none;
    }

    dt {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.95rem;
      margin: 0 0 0.3rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .tag-aff {
      font-size: 0.7rem;
      background: var(--text-main);
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    dd {
      margin: 0 0 0.5rem 0;
      padding-left: 1.25rem;
      border-left: 2px solid var(--line);
      font-size: 0.95rem;
    }

    dd p {
      margin: 0 0 0.5rem 0;
    }

    a {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--text-main);
      border-bottom: 1px dotted var(--line);
      padding-bottom: 2px;
      transition: background-color 0.1s ease, color 0.1s ease;
    }

    a:focus-visible {
      background-color: var(--highlight-yellow);
      outline: none;
      color: #000;
      border-bottom: none;
    }

    /* Footer */
    .memo-footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 2px solid var(--text-main);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .memo-footer p {
      margin: 0.25rem 0;
    }

    .disclosure {
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 1rem 0.5rem; }
      .memo-wrapper { padding: 1rem; }
      h1 { font-size: 1.1rem; }
      dt { font-size: 0.9rem; }
      dd { font-size: 0.9rem; }
    }

    /* Classes ancien en-tête memo-official-header retirées (remplacées par .memo-combined ci-dessus) */

    /* Mentions références articles (impl Léa Option A) */
    .memo-ref-article {
        font-family: 'Courier New', monospace;
        color: #b91c1c;
        text-transform: uppercase;
        font-size: 0.78rem;
        letter-spacing: 0.05em;
        margin-bottom: 0.3rem;
        display: block;
    }
  </style>

  <!-- Cloudflare Web Analytics (cohérence avec rareradar principal) -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
          data-cf-beacon='{"token": "732165e22299452fb9a36ce435b3c799"}'></script>
</head>
<body>
  <div class="memo-wrapper">
    {{ content }}
  </div>
</body>
</html>
