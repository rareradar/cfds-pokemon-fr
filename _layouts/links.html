<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e5e5e0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  <!-- OpenGraph pour partage sur réseaux -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ '/assets/marie/avatar.webp' | absolute_url }}">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <style>
    :root {
      --bg-page: #e5e5e0;
      --bg-paper: #ffffff;
      --text-main: #111111;
      --text-muted: #444444;
      --line: #999999;
      --accent-red: #b91c1c;
      --highlight-yellow: #ffeb3b;
      --font-mono: 'Courier New', Courier, monospace;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 1.5rem 1rem;
      background: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.45;
      font-size: 16px;
    }

    .memo-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-paper);
      border: 2px solid var(--text-main);
      padding: 1.5rem;
      position: relative;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.15);
    }

    /* Filigrane CONFIDENTIEL */
    .memo-wrapper::before {
      content: 'CONFIDENTIEL';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-35deg);
      font-family: var(--font-mono);
      font-size: 4.5rem;
      font-weight: 900;
      color: rgba(185, 28, 28, 0.07);
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
      user-select: none;
    }

    /* Header */
    .memo-header {
      position: relative;
      z-index: 1;
      border-bottom: 2px solid var(--text-main);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    .stamp-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 0.75rem;
      transform: rotate(-2deg);
    }

    .avatar-stamp-img {
      width: 72px;
      height: auto;
      border: 3px double var(--accent-red);
      padding: 3px;
      background: #fff;
      filter: grayscale(100%) contrast(110%);
      display: block;
    }

    .stamp-label {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.65rem;
      color: var(--accent-red);
      text-transform: uppercase;
      border: 1px solid var(--accent-red);
      padding: 2px 6px;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 900;
      margin: 0.25rem 0 0.1rem 0;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .handle {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0;
    }

    .slogan {
      font-style: italic;
      margin: 0.75rem 0 0;
      padding-left: 1rem;
      border-left: 3px solid var(--accent-red);
      font-size: 0.95rem;
    }

    /* Liste / Grille */
    .memo-list {
      position: relative;
      z-index: 1;
    }

    dl {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0;
    }

    article.item {
      border-bottom: 1px solid var(--line);
      padding: 1rem 0;
      display: contents;
    }

    article.item:last-child {
      border-bottom: none;
    }

    dt {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.95rem;
      margin: 0 0 0.3rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .tag-aff {
      font-size: 0.7rem;
      background: var(--text-main);
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    dd {
      margin: 0 0 0.5rem 0;
      padding-left: 1.25rem;
      border-left: 2px solid var(--line);
      font-size: 0.95rem;
    }

    dd p {
      margin: 0 0 0.5rem 0;
    }

    a {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--text-main);
      border-bottom: 1px dotted var(--line);
      padding-bottom: 2px;
      transition: background-color 0.1s ease, color 0.1s ease;
    }

    a:focus-visible {
      background-color: var(--highlight-yellow);
      outline: none;
      color: #000;
      border-bottom: none;
    }

    /* Footer */
    .memo-footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 2px solid var(--text-main);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .memo-footer p {
      margin: 0.25rem 0;
    }

    .disclosure {
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 1rem 0.5rem; }
      .memo-wrapper { padding: 1rem; }
      h1 { font-size: 1.1rem; }
      dt { font-size: 0.9rem; }
      dd { font-size: 0.9rem; }
    }

    /* === En-tête mémo officiel (fix CSS Léa itération 3) === */
    .memo-official-header {
        font-family: system-ui, -apple-system, sans-serif;
        color: #111;
        background: #fff;
        padding: 24px 20px;
        margin-bottom: 24px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
    }
    .memo-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px 20px;
    }
    @media (max-width: 380px) {
        .memo-grid {
            grid-template-columns: 1fr;
            gap: 12px;
        }
    }
    .memo-field { display: flex; flex-direction: column; gap: 4px; }
    .memo-field dt {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        color: #b91c1c;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        margin: 0;
        line-height: 1.2;
    }
    .memo-field dd {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.45;
        color: #111;
        overflow-wrap: break-word;
    }
    .memo-separator {
        border: none;
        border-top: 2px dashed #d1d5db;
        margin: 20px 0;
        opacity: 0.6;
    }
    .memo-title {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 1rem;
        color: #b91c1c;
        margin: 0 0 12px 0;
        letter-spacing: 0.02em;
        line-height: 1.35;
    }
    .memo-intro {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.55;
        color: #374151;
    }
  </style>

  <!-- Cloudflare Web Analytics (cohérence avec rareradar principal) -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
          data-cf-beacon='{"token": "732165e22299452fb9a36ce435b3c799"}'></script>
</head>
<body>
  <div class="memo-wrapper">
    {{ content }}
  </div>
</body>
</html>
