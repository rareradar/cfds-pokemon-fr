<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1018">
  <meta name="color-scheme" content="dark">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300..700&family=Source+Serif+4:opsz,wght@8..60,400..800&display=swap" rel="stylesheet">

  <!-- OpenGraph pour partage sur réseaux -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ '/assets/marie/avatar.webp' | absolute_url }}">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <style>
    :root {
      --bg: #0d1018;
      --bg-soft: #161a26;
      --fg: #e9ebf1;
      --fg-dim: #9aa0b0;
      --accent: #f5b800;
      --border: rgba(255,255,255,0.08);
      --card-bg: rgba(255,255,255,0.04);
      --card-hover: rgba(245,184,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Public Sans', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fond animé subtil — gradient radial + noise */
    .ambient {
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(245,184,0,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(100,120,200,0.06) 0%, transparent 50%);
    }
    .ambient::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.03'/></svg>");
      pointer-events: none;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* Header avatar + persona */
    .profile {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .profile__avatar {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2f42 0%, #161a26 100%);
      margin: 0 auto 1.25rem;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 3px var(--bg),
        0 0 0 5px rgba(245,184,0,0.5),
        0 16px 48px rgba(0,0,0,0.5);
    }
    .profile__avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .profile__name {
      font-family: 'Source Serif 4', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.25rem;
    }
    .profile__tagline {
      font-size: 0.95rem;
      color: var(--fg-dim);
      margin-bottom: 0.5rem;
    }
    .profile__slogan {
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--fg);
      opacity: 0.85;
      margin: 0.5rem auto 0.5rem;
      max-width: 320px;
      line-height: 1.4;
    }
    .profile__handle {
      display: inline-block;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      background: rgba(245,184,0,0.08);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      border: 1px solid rgba(245,184,0,0.15);
      margin-top: 0.5rem;
    }

    /* Liens en cartes */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }
    .link-card {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.95rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--fg);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      opacity: 0;
      animation: cardIn 0.5s ease forwards;
    }
    /* Stagger anim entrée pour les 5 premières */
    .link-card:nth-child(1) { animation-delay: 0.05s; }
    .link-card:nth-child(2) { animation-delay: 0.12s; }
    .link-card:nth-child(3) { animation-delay: 0.19s; }
    .link-card:nth-child(4) { animation-delay: 0.26s; }
    .link-card:nth-child(5) { animation-delay: 0.33s; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--card-accent, var(--accent)) 0%, transparent 100%);
      opacity: 0.6;
      transition: opacity 0.18s ease, width 0.18s ease;
    }
    .link-card:hover {
      background: var(--card-hover);
      border-color: rgba(245,184,0,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(245,184,0,0.1);
    }
    .link-card:hover::before {
      width: 4px;
      opacity: 1;
    }
    .link-card__emoji {
      font-size: 1.65rem;
      line-height: 1;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .link-card__text {
      flex: 1;
      min-width: 0;
    }
    .link-card__title {
      display: block;
      font-weight: 700;
      font-size: 1.02rem;
      color: var(--fg);
      margin-bottom: 0.35rem;
      letter-spacing: -0.005em;
      line-height: 1.3;
    }
    .link-card__pitch {
      display: block;
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      font-size: 0.86rem;
      color: var(--fg-dim);
      line-height: 1.45;
    }
    .link-card__arrow {
      color: var(--fg-dim);
      font-size: 1.35rem;
      flex-shrink: 0;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    .link-card:hover .link-card__arrow {
      transform: translateX(3px);
      color: var(--accent);
    }
    .link-card__badge {
      position: absolute;
      top: 0.6rem;
      right: 2.6rem;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(245,184,0,0.1);
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid rgba(245,184,0,0.2);
    }

    /* Section title */
    .section-title {
      font-family: 'Source Serif 4', serif;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--fg-dim);
      margin: 2rem 0 0.75rem;
      padding-left: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::before, .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }
    .section-title::before {
      flex: 0 0 24px;
    }

    /* Footer disclosure — minimaliste */
    footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.72rem;
      color: var(--fg-dim);
      line-height: 1.6;
      opacity: 0.6;
    }
    footer a { color: var(--fg-dim); text-decoration: underline; }
    footer a:hover { color: var(--accent); }

    /* Reduced motion — global override (Léa audit 2026-05-20) */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  <!-- Cloudflare Web Analytics (cohérence avec rareradar principal) -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
          data-cf-beacon='{"token": "732165e22299452fb9a36ce435b3c799"}'></script>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main>
    {{ content }}

    <footer>
      <p>Liens <strong>(aff)</strong> = affiliés Amazon. Petite commission, sans surcoût pour toi.</p>
    </footer>
  </main>
</body>
</html>
