<!doctype html>
<html lang="{{ site.lang | default: 'fr' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1018">
  <meta name="color-scheme" content="dark">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300..700&family=Source+Serif+4:opsz,wght@8..60,400..800&display=swap" rel="stylesheet">

  <!-- OpenGraph pour partage sur réseaux -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ '/assets/marie/avatar.png' | absolute_url }}">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <style>
    :root {
      --bg: #0d1018;
      --bg-soft: #161a26;
      --fg: #e9ebf1;
      --fg-dim: #9aa0b0;
      --accent: #f5b800;
      --border: rgba(255,255,255,0.08);
      --card-bg: rgba(255,255,255,0.04);
      --card-hover: rgba(245,184,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Public Sans', system-ui, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Fond animé subtil — gradient radial + noise */
    .ambient {
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(245,184,0,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(100,120,200,0.06) 0%, transparent 50%);
    }
    .ambient::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.03'/></svg>");
      pointer-events: none;
    }

    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    /* Header avatar + persona */
    .profile {
      text-align: center;
      margin-bottom: 2rem;
    }
    .profile__avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2f42 0%, #161a26 100%);
      margin: 0 auto 1rem;
      overflow: hidden;
      border: 2px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .profile__avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .profile__name {
      font-family: 'Source Serif 4', serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .profile__tagline {
      font-size: 0.95rem;
      color: var(--fg-dim);
      margin-bottom: 0.5rem;
    }
    .profile__handle {
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    /* Liens en cartes */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .link-card {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 1rem 1.125rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--fg);
      text-decoration: none;
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }
    .link-card:hover {
      background: var(--card-hover);
      border-color: rgba(245,184,0,0.3);
      transform: translateY(-1px);
    }
    .link-card__emoji {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .link-card__text {
      flex: 1;
      min-width: 0;
    }
    .link-card__title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.125rem;
    }
    .link-card__pitch {
      font-size: 0.825rem;
      color: var(--fg-dim);
      line-height: 1.4;
    }
    .link-card__arrow {
      color: var(--fg-dim);
      font-size: 1.25rem;
      flex-shrink: 0;
    }

    /* Section title */
    .section-title {
      font-family: 'Source Serif 4', serif;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-dim);
      margin: 2rem 0 0.75rem;
      padding-left: 0.25rem;
    }

    /* Footer disclosure */
    footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--fg-dim);
      line-height: 1.6;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .link-card { transition: none; }
    }
  </style>

  <!-- Cloudflare Web Analytics (cohérence avec rareradar principal) -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
          data-cf-beacon='{"token": "732165e22299452fb9a36ce435b3c799"}'></script>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main>
    {{ content }}

    <footer>
      <p>Liens marqués <strong>(aff)</strong> = liens affiliés Amazon Partenaires.
      Je touche une petite commission sans surcoût pour toi si tu commandes.
      Merci de soutenir le contenu 💛</p>
      <p style="margin-top: 0.5rem;">
        <a href="https://rareradar.fr">← rareradar.fr</a>
      </p>
    </footer>
  </main>
</body>
</html>
